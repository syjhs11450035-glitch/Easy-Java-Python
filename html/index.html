<script>
    async function loadMarkdown() {
        const urlParams = new URLSearchParams(window.location.search);
        let filePath = urlParams.get('file');

        // 如果 URL 有 file 參數，才執行 fetch 替換內容
        if (filePath) {
            const container = document.getElementById('md-content');
            container.innerHTML = "正在載入文檔...";
            
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error("找不到檔案");
                
                const text = await response.text();
                
                // 渲染 Markdown
                container.innerHTML = marked.parse(text);
                
                // 加入一個「返回導覽」的按鈕
                const backBtn = document.createElement('div');
                // backBtn.innerHTML = `<hr><a href="index.html" style="display:inline-block; margin-top:20px;">⬅️ 返回文檔清單</a>`;
                container.appendChild(backBtn);

                document.title = "EJP | " + filePath.split('/').pop().replace('', '');

            } catch (error) {
                container.innerHTML = `<h2>⚠️ 載入失敗</h2><p>無法讀取：${filePath}`;
            }
        }
        else {
            window.location.replace("./index.html?file=https://syjhs11450035-glitch.github.io/Easy-Java-Python/README.md");
        }
    }

    window.onload = loadMarkdown;
</script>
